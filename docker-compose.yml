services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kb
      POSTGRES_USER: kb
      POSTGRES_PASSWORD: kb_dev_pwd
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kb"]
      interval: 5s
      timeout: 3s
      retries: 20

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports: ["9200:9200"]
    volumes: ["esdata:/usr/share/elasticsearch/data"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: kb
      MINIO_ROOT_PASSWORD: kb_dev_pwd
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 30

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  kb-backend:
    build: .
    depends_on:
      postgres: { condition: service_healthy }
      elasticsearch: { condition: service_healthy }
      minio: { condition: service_healthy }
      redis: { condition: service_started }
    environment:
      DATABASE_URL: postgresql+psycopg://kb:kb_dev_pwd@postgres:5432/kb
      ES_URL: http://elasticsearch:9200
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: kb
      MINIO_SECRET_KEY: kb_dev_pwd
      REDIS_URL: redis://redis:6379/0
      ZHIPU_API_KEY: ${ZHIPU_API_KEY}
      KB_API_KEY: ${KB_API_KEY:-kb_dev_api_key}
    ports: ["8000:8000"]

volumes:
  pgdata:
  esdata:
  miniodata:
